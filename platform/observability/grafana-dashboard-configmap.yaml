# ============================================================
# grafana-dashboard-configmap.yaml — E-Commerce Overview Dashboard
# ============================================================
# LEARNING NOTE — How Grafana dashboard auto-loading works:
#
#   1. grafana-values.yaml configures the Grafana sidecar:
#        sidecar.dashboards.enabled: true
#        sidecar.dashboards.label: grafana_dashboard
#
#   2. The sidecar (k8s-sidecar) watches ALL namespaces for ConfigMaps
#      that have the label "grafana_dashboard: '1'"
#
#   3. When it finds one, it copies the JSON into Grafana's dashboard
#      provisioning directory (/var/lib/grafana/dashboards/)
#
#   4. Grafana hot-reloads the directory — no restart needed!
#
# Apply: kubectl apply -f platform/observability/grafana-dashboard-configmap.yaml
# Then open: http://localhost:3000 → Dashboards → E-Commerce Platform Overview
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-overview-dashboard
  namespace: monitoring          # Must be in monitoring namespace where Grafana runs
  labels:
    grafana_dashboard: "1"       # This label triggers the Grafana sidecar to load it
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  ecommerce-overview.json: |
    {
      "annotations": { "list": [] },
      "description": "E-Commerce Platform — HTTP rates, error rates, latency (p50/p95/p99), pod memory/CPU, DB connections",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "🌐 HTTP Traffic",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"ecommerce-dev\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Service (req/s)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.01 },
                { "color": "red", "value": 0.05 }
              ]},
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"ecommerce-dev\",status_code=~\"5..\"}[5m])) by (service) / sum(rate(http_requests_total{namespace=\"ecommerce-dev\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "5xx Error Rate by Service",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "⏱ Latency (p50 / p95 / p99)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"ecommerce-dev\"}[5m])) by (le, service))",
              "legendFormat": "p50 {{service}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"ecommerce-dev\"}[5m])) by (le, service))",
              "legendFormat": "p95 {{service}}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"ecommerce-dev\"}[5m])) by (le, service))",
              "legendFormat": "p99 {{service}}",
              "refId": "C"
            }
          ],
          "title": "Request Latency Percentiles",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "title": "🖥 Pod Resources",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 4,
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"ecommerce-dev\",container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Memory Usage by Pod",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 5,
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"ecommerce-dev\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage by Pod (cores)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["ecommerce", "microservices", "kubernetes"],
      "time": { "from": "now-3h", "to": "now" },
      "title": "E-Commerce Platform Overview",
      "uid": "ecommerce-overview",
      "version": 1
    }
