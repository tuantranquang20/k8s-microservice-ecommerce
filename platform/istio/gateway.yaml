# ============================================================
# gateway.yaml — Istio IngressGateway configuration
# ============================================================
# LEARNING NOTE — Istio Gateway vs Kubernetes Ingress:
#
# Kubernetes Ingress: controller-specific annotations for routing rules.
# Istio Gateway: separates "what ports to expose" (Gateway CRD) from
# "how to route" (VirtualService CRD). This gives finer-grained control:
#   - TLS termination with cert-manager integration
#   - HTTP → HTTPS redirect at the gateway level
#   - Serving multiple domains on separate VirtualServices
#
# In this project: Kong handles external → cluster traffic.
# The Istio Gateway handles INTERNAL mesh traffic routing.
# You can also replace Kong with Istio Gateway in the future.

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ecommerce-gateway
  namespace: ecommerce-dev
spec:
  # Applies to the default Istio ingress gateway pod (label: istio=ingressgateway)
  selector:
    istio: ingressgateway

  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"   # Accept all hostnames (restrict in production)

    # ── HTTPS (enable when you have a TLS certificate) ─────────
    # - port:
    #     number: 443
    #     name: https
    #     protocol: HTTPS
    #   tls:
    #     mode: SIMPLE
    #     credentialName: ecommerce-tls-cert   # TLS secret from cert-manager
    #   hosts:
    #     - "*.yourdomain.com"
---
# ── VirtualService for the frontend via Istio Gateway ─────────
# Routes traffic coming through the Istio ingress gateway to services.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ecommerce-ingress
  namespace: ecommerce-dev
spec:
  hosts:
    - "*"
  gateways:
    - ecommerce-gateway

  http:
    - match:
        - uri: { prefix: "/api/users" }
      route:
        - destination: { host: user-service, port: { number: 3000 } }

    - match:
        - uri: { prefix: "/api/auth" }
      route:
        - destination: { host: user-service, port: { number: 3000 } }

    - match:
        - uri: { prefix: "/api/products" }
      route:
        - destination: { host: product-service, port: { number: 8000 } }

    - match:
        - uri: { prefix: "/api/orders" }
      route:
        # order-service canary routing is handled by order-service-canary.yaml
        - destination: { host: order-service, port: { number: 8080 } }

    - match:
        - uri: { prefix: "/api/payments" }
      route:
        - destination: { host: payment-service, port: { number: 8090 } }

    - match:
        - uri: { prefix: "/api" }
      route:
        - destination: { host: api-gateway-bff, port: { number: 3001 } }

    # Catch-all → frontend
    - route:
        - destination: { host: frontend, port: { number: 80 } }
