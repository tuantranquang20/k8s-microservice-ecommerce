# order-service / k3d local overrides
replicaCount: 1
image:
  repository: "k3d-local-registry:5050/order-service"
  tag: "latest"
  pullPolicy: Always
resources:
  requests: { cpu: "50m",  memory: "32Mi" }
  limits:   { cpu: "200m", memory: "64Mi" }
env:
  GIN_MODE: "debug"
  DB_PASSWORD: "changeme"
  REDIS_PASSWORD: ""
  # Must match user-service JWT_SECRET exactly — all services share the
  # same symmetric key to sign and verify tokens (HMAC-SHA256)
  JWT_SECRET: "local-dev-secret-not-for-prod"
vault:
  enabled: false
