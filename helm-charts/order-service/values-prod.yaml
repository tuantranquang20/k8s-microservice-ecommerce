# =============================================================
# values-prod.yaml — order-service (EKS / Production)
# =============================================================
replicaCount: 2

image:
  repository: ""   # Set by CI/CD to ECR URL
  tag: ""          # Set by CI/CD to git SHA
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "400m"
    memory: "128Mi"

env:
  GIN_MODE: "release"
  # DB_PASSWORD and JWT_SECRET come from Vault Agent injection
  REDIS_PASSWORD: ""   # Set in Vault for prod

vault:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1
