apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "payment-service.fullname" . }}-config
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
data:
  RUST_LOG: {{ .Values.env.RUST_LOG | quote }}
  PORT:     {{ .Values.env.PORT | quote }}
  # RUST_ENV controls dev-mode behaviours (e.g. JWT signature bypass)
  RUST_ENV: {{ if .Values.vault.enabled }}"production"{{ else }}"development"{{ end }}
