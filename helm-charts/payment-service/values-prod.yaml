# =============================================================
# values-prod.yaml — payment-service (EKS / Production)
# =============================================================
replicaCount: 2

image:
  repository: ""   # Set by CI/CD to ECR URL
  tag: ""          # Set by CI/CD to git SHA
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "400m"
    memory: "128Mi"

env:
  RUST_LOG: "info"   # info in prod — debug too verbose
  # JWT_SECRET comes from Vault Agent injection

vault:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1
