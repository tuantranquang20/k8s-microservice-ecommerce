apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "product-service.fullname" . }}-config
  labels:
    {{- include "product-service.labels" . | nindent 4 }}
data:
  PYTHON_ENV: {{ .Values.env.PYTHON_ENV | quote }}
  PORT:        {{ .Values.env.PORT | quote }}
  MONGO_URI:   {{ .Values.env.MONGO_URI | quote }}
  MONGO_DB:    {{ .Values.env.MONGO_DB | quote }}
